#gag {^Having (too many|over 500) items in your inventory seriously increases your character's risk of being corrupted\.  A corrupted character loses everything, including all their experience, and may take several months to restore\.  To keep your character below (400|500) items, keep your mortar cleaned out, get rid of any excess herbs, and be sure to visit the pawnshop, gemshop, and furrier regularly\.}
#gag {^Characters who log in with more than 500 items are automatically sent to an area where they must throw away excess items before being able to play.*}
#gag {^An ashu hhinvi crouches its lumbering hulk close to the ground, placing its paw-like hands on the sand\.  Waves of sparkling particles funnel upward into the creature's colossal form to fill out the cracks suffered in the heat of combat\.  Replenished and healed of its most injurious wound, the ashu hhinvi stands erect once again, more healthy and agitated than before\.|^A black scorpion emerges from the depths of the ashu hhinvi's torso before quickly disappearing back into the comforting sand\.|^An ashu hhinvi reshapes its forelimbs into various blunt, weapon-like appendages before settling on a style it likes\.|^An ashu hhinvi grabs a handful of sand from the ground and allows it to trickle through its palm into the wind\.|^The ground beneath an ashu hhinvi sinks as it rocks back and forth\.|^The desert winds pick up, forcing an ashu hhinvi to pause momentarily to concentrate on keeping its rigid form\.|^An ashu hhinvi bends over on all fours and siphons sand from the ground into its massive body\.  Once it finishes the process, it straightens to its full imposing height and recreates the details of its extremities\.|^An ashu hhinvi emits a gagging cough and hacks up a piece of smooth glass\.  It tosses the fragment over its shoulder to litter the rolling dunes\.|^The sand on an ashu hhinvi's face shifts to reveal a slightly different yet still unreadable expression\.|^An ashu hhinvi beats its chest rhythmically like a giant ape, sending explosive clouds of sand outward with every rough thump\.|^Raising its arms above its head, an ashu hhinvi looks to the sky, as if for solace or redemption from above\.} {hhinvi}
#gag {^A s'sugi malchata shakes its head\.|^A s'sugi malchata glances around\.|^A s'sugi malchata appears confused\.|^A s'sugi malchata looks at you\.|^A long-legged spider crawls across the spines of a cactus carefully, as if choosing the least painful path\.|^A s'sugi malchata surveys its surroundings calmly\.|^A spotted grey lizard dashes across the surface of the boulder, disappearing down the back side\.|^The sand swirls around a s'sugi malchata, improving its balance\.|^A s'sugi malchata studies the dunes momentarily\.|^A s'sugi malchata drifts down and traces images in the sand, studying the area carefully\.\.\.|^A s'sugi malchata carefully assesses the area\.} {malchata}
#gag {^The Dragon Priest mounted upon the back of an armored shalswar throws its weapon into the air and snarls, \"The infidelsss will burn within the purifying flame of the World Dragon\!\"|^A Dragon Priest zealot hisses, \"Bow before the might of the Dragon Priests\!\"|^A Dragon Priest zealot scans the area with keen perception, issuing a low hiss.|^A Dragon Priest zealot snatches the triangular dagger attached to a fine steel chain dangling at its hip and begins spinning the blade wildly though the air\.|^With a smooth snap of its wrist, the Dragon Priest zealot sends the dagger flying towards you in a blur of deadly steel\!|^Stepping sideways with quick movements, you barely manage to evade the triangular blade, which speeds past you to lodge shallowly in the ground nearby\.|^You manage to slap the dagger aside with your weapon, sending it spinning wildly off course to lodge in the ground nearby\.|^A Dragon Priest zealot drags its talons across the breast of its armor with a high-pitched squeal\.|^A Dragon Priest zealot rubs the back of its neck in frustration\.|^A Dragon Priest zealot smoothly slips the triangular blade attached to a fine steel chain from its hip and lowers its stance with a gentle hiss\.|Taking careful aim, the Dragon Priest zealot flings the triangular blade at you with a snarl\!|^With quick movements, Ryken evades the triangular dagger with little room to spare\.|^A Dragon Priest zealot snarls, \"I shall give my life in the name of the World Dragon!\"|^With lightning fast speed, Ryken easily evades the triangular dagger with room to spare\.|^Stepping sideways with agile movements, you manage to easily evade the triangular blade, which speeds past you to lodge shallowly in the ground nearby\.|^A Dragon Priest zealot hops nimbly on the balls of its feet, swinging its weapon around in a blur of steel\.|^A Dragon Priest zealot swings its head back and fourth, cracking its neck with a loud \*POP\*\.|^A Dragon Priest zealot briefly lifts the visor